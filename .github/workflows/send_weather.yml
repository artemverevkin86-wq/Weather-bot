name: Ежедневная погода в Discord

on:
  schedule:
    # Запуск каждый день в 00:00 по МСК (UTC+3)
    # В UTC это 21:00 предыдущего дня
    - cron: '0 21 * * *'
  workflow_dispatch:  # Эта строчка позволяет запустить вручную для теста

jobs:
  send-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout репозиторий
        uses: actions/checkout@v4
      
      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Установить зависимости
        run: pip install requests
        
      - name: Запустить бота погоды
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python weather_bot.py
